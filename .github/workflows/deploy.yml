name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-backend:
    name: Deploy Backend to Fly.io
    runs-on: ubuntu-latest
    # Only runs if FLY_API_TOKEN secret is configured
    if: ${{ false }}  # set to "true" or use conditional after adding secret
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly
        run: flyctl deploy --remote-only --config fly.toml
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # Vercel auto-deploys on push — no GitHub Actions needed.
  # Connect your GitHub repo to Vercel via their dashboard.
