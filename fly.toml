# Fly.io configuration for Etsy Assistant backend
# Run `fly launch --no-deploy` first (or use scripts/setup-free.sh)
# Then `fly deploy` to deploy.

app = "etsy-assistant"
primary_region = "iad"  # Ashburn, VA (change to your nearest region)

[build]
  dockerfile = "backend/Dockerfile.fly"

[env]
  # Backend selectors for free deployment
  STORAGE_BACKEND = "supabase"
  DB_BACKEND = "supabase"
  PORT = "8080"
  # Set these with `fly secrets set`:
  #   ANTHROPIC_API_KEY, ETSY_API_KEY, FRONTEND_URL,
  #   SUPABASE_URL, SUPABASE_DB_URL,
  #   SUPABASE_S3_ACCESS_KEY_ID, SUPABASE_S3_SECRET_ACCESS_KEY,
  #   S3_BUCKET, CORS_ORIGINS

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"  # free tier: stop when idle
  auto_start_machines = true
  min_machines_running = 0     # save money
  processes = ["app"]

[[http_service.checks]]
  interval = "30s"
  timeout = "5s"
  grace_period = "10s"
  method = "GET"
  path = "/health"

[[vm]]
  memory = "512mb"  # free tier
  cpu_kind = "shared"
  cpus = 1
