AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: Etsy Assistant - Image processing backend

Parameters:
  CorsOrigins:
    Type: String
    Default: "http://localhost:3000"
  AnthropicApiKey:
    Type: String
    NoEcho: true
    Default: ""
  EtsyApiKey:
    Type: String
    NoEcho: true
    Default: ""
  FrontendUrl:
    Type: String
    Default: "http://localhost:3000"
  AlarmEmail:
    Type: String
    Default: ""
    Description: Email for CloudWatch alarm notifications (leave empty to skip)

Globals:
  Function:
    Timeout: 60
    MemorySize: 1024

Resources:
  ImageBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "etsy-assistant-images-${AWS::AccountId}"
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ["*"]
            AllowedMethods: [GET, PUT]
            AllowedOrigins: ["*"]
            MaxAge: 3600
      LifecycleConfiguration:
        Rules:
          - Id: CleanupUploads
            Prefix: uploads/
            Status: Enabled
            ExpirationInDays: 7
          - Id: CleanupProcessed
            Prefix: processed/
            Status: Enabled
            ExpirationInDays: 30

  CredentialsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: etsy-assistant-credentials
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  ApiFunction:
    Type: AWS::Serverless::Function
    Metadata:
      DockerTag: latest
      DockerContext: ../backend
      Dockerfile: Dockerfile
    Properties:
      PackageType: Image
      Architectures: [x86_64]
      Environment:
        Variables:
          S3_BUCKET: !Ref ImageBucket
          CORS_ORIGINS: !Ref CorsOrigins
          ANTHROPIC_API_KEY: !Ref AnthropicApiKey
          ETSY_API_KEY: !Ref EtsyApiKey
          FRONTEND_URL: !Ref FrontendUrl
          DYNAMODB_TABLE: !Ref CredentialsTable
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ImageBucket
        - DynamoDBCrudPolicy:
            TableName: !Ref CredentialsTable
      Events:
        Api:
          Type: HttpApi
          Properties:
            Path: /{proxy+}
            Method: ANY
        Root:
          Type: HttpApi
          Properties:
            Path: /
            Method: ANY

  # ── CloudWatch Alarms ──

  AlarmTopic:
    Type: AWS::SNS::Topic
    Condition: HasAlarmEmail
    Properties:
      TopicName: etsy-assistant-alarms
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlarmEmail

  LambdaErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: etsy-assistant-lambda-errors
      AlarmDescription: Triggers when Lambda errors exceed 5 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmEmail, !Ref AlarmTopic, !Ref "AWS::NoValue"]

  LambdaThrottleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: etsy-assistant-lambda-throttles
      AlarmDescription: Triggers when Lambda throttles exceed 3 in 5 minutes
      Namespace: AWS/Lambda
      MetricName: Throttles
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmEmail, !Ref AlarmTopic, !Ref "AWS::NoValue"]

  LambdaDurationAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: etsy-assistant-lambda-slow
      AlarmDescription: Triggers when average Lambda duration exceeds 30 seconds
      Namespace: AWS/Lambda
      MetricName: Duration
      Dimensions:
        - Name: FunctionName
          Value: !Ref ApiFunction
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 30000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmEmail, !Ref AlarmTopic, !Ref "AWS::NoValue"]

  ApiGateway4xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: etsy-assistant-api-4xx
      AlarmDescription: Triggers when API 4xx errors exceed 20 in 5 minutes
      Namespace: AWS/ApiGateway
      MetricName: 4xx
      Dimensions:
        - Name: ApiId
          Value: !Ref ServerlessHttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 20
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ApiGateway5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: etsy-assistant-api-5xx
      AlarmDescription: Triggers when API 5xx errors exceed 3 in 5 minutes
      Namespace: AWS/ApiGateway
      MetricName: 5xx
      Dimensions:
        - Name: ApiId
          Value: !Ref ServerlessHttpApi
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 3
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !If [HasAlarmEmail, !Ref AlarmTopic, !Ref "AWS::NoValue"]

Conditions:
  HasAlarmEmail: !Not [!Equals [!Ref AlarmEmail, ""]]

Outputs:
  ApiUrl:
    Description: API Gateway URL
    Value: !Sub "https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com"
  BucketName:
    Description: S3 bucket for images
    Value: !Ref ImageBucket
